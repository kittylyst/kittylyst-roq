---
layout: default
title: Search
description: Search content by tags
---

<section class="mx-auto max-w-3xl">
    <h1 class="text-3xl font-semibold text-gray-900">Search</h1>
    <p class="mt-2 text-gray-600">
        Filter tagged content entirely in your browser.
    </p>

    <div data-search-root data-search-mode="page" class="mt-6 rounded-lg border border-gray-200 bg-white p-4">
        <label class="sr-only" for="site-search-page-input">Search tags</label>
        <input
            id="site-search-page-input"
            data-search-input
            type="search"
            autocomplete="off"
            placeholder="Type a tag (e.g. java, books, web)"
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-500 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
        />
        <div data-search-tags class="mt-3 flex flex-wrap gap-2"></div>
        <p data-search-count class="mt-3 text-sm text-gray-600"></p>
        <ul data-search-results class="mt-3 space-y-2"></ul>
        <p data-search-empty class="mt-3 hidden text-sm text-gray-500">No matching tagged content found.</p>
    </div>
</section>
